name: job_hunt_mobile
description: Cross-platform mobile companion app for job hunting with ATS scoring
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  http: ^1.1.2
  shared_preferences: ^2.2.2
  mobile_scanner: ^3.5.6
  file_picker: ^6.1.1
  flutter_markdown: ^0.6.18+2
  percent_indicator: ^4.2.3
  intl: ^0.18.1
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
